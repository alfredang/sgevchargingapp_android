name: Android Release to Play

# Auto-build, sign, and upload the AAB to Google Play on every push to main.
# Requires repo secrets (Settings → Secrets and variables → Actions):
#   PLAY_SERVICE_ACCOUNT_JSON, KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS,
#   KEY_PASSWORD, and (if used) MAPS_API_KEY, LTA_DATAMALL_ACCOUNT_KEY.
# NOTE: the FIRST release of a new app must be uploaded manually in the Play
# Console; the Play API only updates an app that already has a release.

on:
  push:
    branches: [ main ]
    paths-ignore: [ '**.md', 'docs/**', '.claude/**', 'play-assets/**' ]
  workflow_dispatch:
    inputs:
      track:
        description: 'Play track (alpha = the closed test track)'
        default: 'alpha'
        type: choice
        options: [ internal, alpha, beta, production ]

concurrency:
  group: android-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Preflight — skip cleanly until secrets are configured
        id: pre
        run: |
          if [ -z "${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}" ] || [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Play/keystore secrets not set yet — skipping release. Add repo secrets to enable auto-publish."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.pre.outputs.configured == 'true'

      - uses: actions/setup-java@v4
        if: steps.pre.outputs.configured == 'true'
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        if: steps.pre.outputs.configured == 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        if: steps.pre.outputs.configured == 'true'
        run: |
          mkdir -p keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore/release.jks

      - name: Write local.properties
        if: steps.pre.outputs.configured == 'true'
        run: |
          {
            echo "sdk.dir=$ANDROID_SDK_ROOT"
            echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}"
            echo "LTA_DATAMALL_ACCOUNT_KEY=${{ secrets.LTA_DATAMALL_ACCOUNT_KEY }}"
            echo "RELEASE_STORE_FILE=keystore/release.jks"
            echo "RELEASE_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}"
            echo "RELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }}"
            echo "RELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}"
          } > local.properties

      - name: Generate release notes from CHANGELOG
        if: steps.pre.outputs.configured == 'true'
        run: |
          mkdir -p distribution/whatsnew
          awk '
            /^## \[/ { if (seen) exit; if ($0 !~ /Unreleased/) seen=1; next }
            seen && /^### Play submission/ { exit }
            seen && /^- / { print }
          ' CHANGELOG.md | head -c 480 > distribution/whatsnew/whatsnew-en-US || true
          [ -s distribution/whatsnew/whatsnew-en-US ] || \
            echo "Bug fixes and improvements." > distribution/whatsnew/whatsnew-en-US

      - name: Build signed AAB
        if: steps.pre.outputs.configured == 'true'
        run: ./gradlew :app:bundleRelease -PversionCodeOverride=$(( ${{ github.run_number }} + 100 ))

      - name: Upload to Google Play
        if: steps.pre.outputs.configured == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.alfredang.sgevcharging
          releaseFiles: app/build/outputs/bundle/release/*.aab
          track: ${{ github.event.inputs.track || 'alpha' }}
          status: completed
          whatsNewDirectory: distribution/whatsnew
